name: Build and Deploy to AWS

on:
  push:
    branches: [ "main" ]

jobs:
  build_deploy:
    runs-on: ubuntu-latest

    env:
      AWS_ACCESS_KEY_ID: ${{secrets.AWS_ACCESS_KEY_ID}}
      AWS_SECRET_ACCESS_KEY: ${{secrets.AWS_SECRET_ACCESS_KEY}}

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Prepare backend jar
      working-directory: worker
      run: | 
        mvn clean package
        ls -lh target

    - name: Make terraform.sh executable
      run: chmod +x .github/scripts/terraform.sh

    - name: Provision using Terraform
      run: |
        .github/scripts/terraform.sh init
        .github/scripts/terraform.sh "apply -auto-approve"
